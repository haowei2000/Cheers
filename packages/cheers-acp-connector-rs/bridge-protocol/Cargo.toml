[package]
name = "cheers-bridge-protocol"
# The crate version tracks the connector release; the WIRE version is the
# separate BRIDGE_PROTOCOL_VERSION constant.
version = "0.1.27"
edition = "2021"

# Frame types shared verbatim by the gateway (server/) and the connector —
# drift between the two ends is a compile error instead of a runtime mystery.
# Keep the dependency surface at serde(+json) only so the two consumers can
# never disagree about transitive types.
[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
