# Mini-workspace: the binary + the shared bridge-protocol frame crate (also
# consumed by ../../server via a path dependency). The workspace root staying
# at this directory keeps `cross`/`--locked` release builds and the bot-image
# COPY of this whole directory working unchanged.
[workspace]
members = [".", "bridge-protocol"]

[package]
name = "cce-acp-connector"
version = "0.1.31"
edition = "2021"

[[bin]]
name = "cce-acp-connector"
path = "src/main.rs"

[dependencies]
# Official ACP protocol types (schema crate). Tier A: the connector keeps its
# own JSON-RPC transport but builds the security-sensitive ACP messages (client
# capabilities advertisement + permission decisions) from these typed structs
# instead of hand-written JSON. Stable wire protocol v1 only — no `unstable` features.
agent-client-protocol-schema = "1.1"
# Tier B (in progress): official ACP runtime crate. Replaces the hand-rolled
# JSON-RPC transport, wrapped in an actor so the RuntimeAdapter trait seam is
# unchanged. Inbound session/update + request_permission relay via `UntypedMessage`
# raw hooks (zero-loss opaque relay; see ACP_RUST_SDK_ADOPTION.md §3).
agent-client-protocol = "1"
# Tier B: adapt tokio ChildStdin/ChildStdout (tokio::io) to the futures_io
# AsyncRead/AsyncWrite that the runtime crate's `ByteStreams` transport expects.
tokio-util = { version = "0.7", features = ["compat"] }
anyhow = "1"
async-trait = "0.1"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
cheers-bridge-protocol = { path = "bridge-protocol" }
clap = { version = "4", features = ["derive"] }
ed25519-dalek = { version = "2", features = ["pkcs8", "pem"] }
futures-util = "0.3"
libc = "0.2"
mime_guess = "2"
# Filesystem watch for remote-workspace live-refresh (workspace_req watch/unwatch →
# unsolicited workspace_event frames). We drive it with a manual ~300ms debounce
# (no notify-debouncer crate) so event coalescing + the watch TTL live in one task.
notify = "8"
rand = "0.10"
# Self-update downloads (signed manifest + binaries) through the gateway's
# release proxy. rustls-only, matching tokio-tungstenite's TLS stack.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls-native-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Content etags for safe remote writes: lowercase-hex SHA-256 of raw file bytes
# powers read/write etag replies and the write precondition (if_etag).
sha2 = "0.11"
toml = "1.1"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-native-roots"] }
# Direct dep only to pin the process-level CryptoProvider in main() — without an
# explicit install, rustls panics on the first wss:// connect when feature
# unification leaves it unable to auto-select a provider.
rustls = { version = "0.23", default-features = false, features = ["ring"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }
similar = { version = "3.1.1", default-features = false, features = ["text"] }

[dev-dependencies]
tempfile = "3"
