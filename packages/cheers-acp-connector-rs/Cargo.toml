[package]
name = "cce-acp-connector"
version = "0.1.22"
edition = "2021"

[[bin]]
name = "cce-acp-connector"
path = "src/main.rs"

[dependencies]
# Official ACP protocol types (schema crate). Tier A: the connector keeps its
# own JSON-RPC transport but builds the security-sensitive ACP messages (client
# capabilities advertisement + permission decisions) from these typed structs
# instead of hand-written JSON. Stable wire protocol v1 only — no `unstable` features.
agent-client-protocol-schema = "1.1"
anyhow = "1"
async-trait = "0.1"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
ed25519-dalek = { version = "2", features = ["pkcs8", "pem"] }
futures-util = "0.3"
libc = "0.2"
mime_guess = "2"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-native-roots"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = "3"
