<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- Embedded manifest: the host parses this on upload (inert; never executed). -->
    <script type="application/json" id="cheers-plugin">
      {
        "id": "lit-review",
        "title": "Literature review",
        "renderers": [
          { "id": "papers", "title": "Paper tracker", "match": { "format": "json", "jsonHas": ["papers"] } }
        ]
      }
    </script>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font: 13px system-ui, sans-serif; background: #0a0a0a; color: #e4e4e7; display: flex; flex-direction: column; height: 100vh; }
      header { display: flex; gap: 8px; align-items: center; padding: 6px 10px; border-bottom: 1px solid #27272a; flex-shrink: 0; }
      header b { font-size: 12px; }
      #root { flex: 1; overflow: auto; padding: 8px; }
      button { background: #27272a; color: #e4e4e7; border: 0; border-radius: 4px; padding: 2px 8px; cursor: pointer; font: inherit; }
      button:hover { background: #3f3f46; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th { text-align: left; font-weight: 400; color: #71717a; padding: 4px; white-space: nowrap; }
      td { padding: 2px 4px; border-top: 1px solid #27272a55; }
      input, select { background: transparent; color: #e4e4e7; border: 0; outline: 0; font: inherit; width: 100%; }
      select { background: #27272a; border-radius: 3px; padding: 1px 2px; }
      .stars { white-space: nowrap; cursor: pointer; color: #71717a; user-select: none; }
      .stars .on { color: #e8a33d; }
      .x { color: #71717a; cursor: pointer; }
      #st { padding: 2px 10px 6px; color: #71717a; font-size: 11px; }
    </style>
  </head>
  <body>
    <header><b>Paper tracker</b><span id="count" style="color:#71717a"></span><span style="flex: 1"></span><button id="save">Save</button></header>
    <div id="root"></div>
    <div id="st"></div>
    <script>
      // Renderer-protocol plugin (see docs/arch/RENDERER_PLUGIN.md):
      //   host -> plugin: cheers:render {path, format, content, version, rendererId}
      //   plugin -> host: cheers:save {content} / cheers:unsupported {reason}
      //   host -> plugin: cheers:saved {ok, version, error?}
      var ASSIGN = null, state = null;
      var STATUS = ["To read", "Reading", "Read", "Cited", "Discarded"];
      var COLS = [["title", "Title"], ["authors", "Authors"], ["venue", "Venue"], ["year", "Year"], ["notes", "Notes"]];

      function send(msg) { parent.postMessage(msg, "*"); }
      function setStatus(t) { document.getElementById("st").textContent = t; }
      function save() { send({ type: "cheers:save", content: JSON.stringify(state, null, 2) }); }

      window.addEventListener("message", function (e) {
        var m = e.data; if (!m || typeof m !== "object") return;
        if (m.type === "cheers:render") {
          ASSIGN = m;
          try { state = JSON.parse(m.content || "{}"); } catch (err) { send({ type: "cheers:unsupported", reason: "not valid JSON" }); return; }
          if (!state || !Array.isArray(state.papers)) { send({ type: "cheers:unsupported", reason: "expected a top-level papers array" }); return; }
          render();
        } else if (m.type === "cheers:saved") {
          if (m.ok) { ASSIGN.version = m.version; setStatus("Saved v" + m.version); }
          else setStatus("Save failed: " + (m.error || ""));
        }
      });

      document.getElementById("save").onclick = save;

      function render() {
        var root = document.getElementById("root"); root.innerHTML = "";
        document.getElementById("count").textContent = " · " + state.papers.length + " papers";
        var tbl = document.createElement("table");
        var thead = "<tr>";
        COLS.forEach(function (c) { thead += "<th>" + c[1] + "</th>"; });
        thead += "<th>Status</th><th>Rating</th><th></th></tr>";
        tbl.innerHTML = "<thead>" + thead + "</thead>";
        var tb = document.createElement("tbody");
        state.papers.forEach(function (row, i) {
          var tr = document.createElement("tr");
          COLS.forEach(function (c) {
            var td = document.createElement("td"), key = c[0];
            var el = document.createElement("input");
            el.value = row[key] == null ? "" : row[key];   // controlled input: untrusted text never hits innerHTML
            el.oninput = function () { state.papers[i][key] = el.value; };
            td.appendChild(el); tr.appendChild(td);
          });
          var tds = document.createElement("td");
          var sel = document.createElement("select");
          STATUS.forEach(function (s) { var op = document.createElement("option"); op.textContent = s; sel.appendChild(op); });
          sel.value = STATUS.indexOf(row.status) >= 0 ? row.status : STATUS[0];
          sel.onchange = function () { state.papers[i].status = sel.value; save(); };
          tds.appendChild(sel); tr.appendChild(tds);
          var tdr = document.createElement("td");
          var stars = document.createElement("span"); stars.className = "stars";
          var rating = Number(row.rating) || 0;
          for (var s = 1; s <= 5; s++) (function (s) {
            var star = document.createElement("span");
            star.textContent = "★"; if (s <= rating) star.className = "on";
            star.onclick = function () { state.papers[i].rating = s === rating ? 0 : s; render(); save(); };
            stars.appendChild(star);
          })(s);
          tdr.appendChild(stars); tr.appendChild(tdr);
          var del = document.createElement("td");
          var x = document.createElement("span"); x.className = "x"; x.textContent = "✕";
          x.onclick = function () { state.papers.splice(i, 1); render(); save(); };
          del.appendChild(x); tr.appendChild(del);
          tb.appendChild(tr);
        });
        tbl.appendChild(tb); root.appendChild(tbl);
        var add = document.createElement("button"); add.textContent = "+ Add paper"; add.style.marginTop = "6px";
        add.onclick = function () { state.papers.push({ title: "", authors: "", venue: "", year: "", notes: "", status: "To read", rating: 0 }); render(); };
        root.appendChild(add);
      }

      send({ type: "cheers:ready" });
    </script>
  </body>
</html>
