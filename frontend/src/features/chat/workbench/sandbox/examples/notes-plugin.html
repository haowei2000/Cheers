<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- Embedded plugin manifest: the host reads this on upload to register the plugin.
         type="application/json" => inert (never executed), data only. -->
    <script type="application/json" id="cheers-plugin">
      { "id": "sandbox-notes", "title": "Sandbox Notes", "panels": [{ "id": "notes", "title": "Notes" }] }
    </script>
    <style>
      body { margin: 0; font: 13px system-ui, sans-serif; background: #0a0a0a; color: #e4e4e7; display: flex; flex-direction: column; height: 100vh; }
      header { display: flex; gap: 8px; align-items: center; padding: 6px 10px; border-bottom: 1px solid #27272a; }
      button { background: #27272a; color: #e4e4e7; border: 0; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
      button:hover { background: #3f3f46; }
      textarea { flex: 1; resize: none; background: #0a0a0a; color: #e4e4e7; border: 0; outline: 0; padding: 10px; font: 12px ui-monospace, monospace; }
      #st { padding: 2px 10px 6px; color: #71717a; font-size: 11px; }
    </style>
  </head>
  <body>
    <header>
      <b>Sandbox Notes</b>
      <span style="flex: 1"></span>
      <button id="save">Save</button>
    </header>
    <textarea id="t" placeholder="This is a sandboxed plugin: it ships its own renderer, runs in an isolated iframe (no access to the host token), and reads/writes plugins/sandbox-notes/notes.md through the host proxy"></textarea>
    <div id="st"></div>
    <script>
      // A self-contained sandboxed plugin. It talks to the host ONLY via postMessage:
      //   plugin -> host: {type:"cheers:ready"} / {type:"cheers:fs", reqId, op, args}
      //   host -> plugin: {type:"cheers:init", channelId} / {type:"cheers:fs:result", reqId, ok, data|error}
      var FILE = "notes.md", rid = 0, pending = {};
      function fs(op, args) {
        return new Promise(function (res) {
          var id = ++rid;
          pending[id] = res;
          parent.postMessage({ type: "cheers:fs", reqId: id, op: op, args: args || {} }, "*");
        });
      }
      window.addEventListener("message", function (e) {
        var m = e.data;
        if (!m || typeof m !== "object") return;
        if (m.type === "cheers:init") {
          load();
        } else if (m.type === "cheers:fs:result") {
          var r = pending[m.reqId];
          if (r) { delete pending[m.reqId]; r(m); }
        }
      });
      function load() {
        fs("read", { path: FILE }).then(function (r) {
          document.getElementById("t").value = r.ok && r.data ? r.data.content || "" : "";
          document.getElementById("st").textContent = r.ok ? "loaded" : "new file";
        });
      }
      document.getElementById("save").onclick = function () {
        fs("write", { path: FILE, content: document.getElementById("t").value }).then(function (r) {
          document.getElementById("st").textContent = r.ok ? "saved v" + (r.data && r.data.version) : "error: " + (r.error || "");
        });
      };
      // tell the host we're ready -> it replies with cheers:init
      parent.postMessage({ type: "cheers:ready" }, "*");
    </script>
  </body>
</html>
