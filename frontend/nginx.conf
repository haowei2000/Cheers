server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker assigns service IPs dynamically when containers are recreated.
    # Resolve the gateway name at request time instead of retaining a stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream http://gateway:8000;

    # Security headers (audit M2). Minimal CSP (no script-src lockdown) to avoid
    # breaking the Vite SPA; tighten with nonces later.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
    # App Store and in-app policy links must resolve to real static documents.
    # Never disguise a missing policy page as a successful SPA fallback.
    location ~ ^/(privacy|support|remote-operations)(\.zh-CN)?(?:\.html)?$ {
        try_files $uri =404;
    }
    location = /index.html {
        try_files /index.html =404;
        # nginx drops inherited add_header once a location sets any, so repeat the
        # security headers here alongside the cache-control ones.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
    }
    # Service worker: must never be cached long — a cached sw.js pins every
    # client to a stale precache manifest until the heuristic expiry. Explicit
    # no-cache makes each registration update-check hit the origin.
    location = /sw.js {
        try_files /sw.js =404;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
    }
    # PWA manifest: correct MIME (nginx's types map lacks .webmanifest) and
    # same no-cache policy so installs pick up icon/name changes promptly.
    location = /manifest.webmanifest {
        try_files /manifest.webmanifest =404;
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
    }
    location /api {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    location = /docs {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    location ^~ /docs/ {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    location = /manual {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    location ^~ /manual/ {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
    location /ws {
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
