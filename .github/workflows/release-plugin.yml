name: Release plugin

on:
  push:
    tags:
      - "openclaw-channel-agentnexus-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)release, e.g. openclaw-channel-agentnexus-v0.2.2"
        required: true

permissions:
  contents: write

concurrency:
  group: release-plugin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/openclaw-channel-agentnexus

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/openclaw-channel-agentnexus/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        id: ver
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-$INPUT_TAG}"
          PKG_VER=$(node -p "require('./package.json').version")
          EXPECTED="openclaw-channel-agentnexus-v${PKG_VER}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match package.json version (expected '$EXPECTED'). Bump version before tagging."
            exit 1
          fi
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VER" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        id: pack
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent)
          # Stable filename so consumers can hit /releases/latest/download/<asset>
          STABLE="openclaw-channel-agentnexus.tgz"
          cp "$TARBALL" "$STABLE"
          ls -la "$TARBALL" "$STABLE"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE"   >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: openclaw-channel-agentnexus v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            packages/openclaw-channel-agentnexus/${{ steps.pack.outputs.tarball }}
            packages/openclaw-channel-agentnexus/${{ steps.pack.outputs.stable }}
