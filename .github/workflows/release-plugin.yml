name: Release plugin

on:
  push:
    tags:
      - "openclaw-channel-agentnexus-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)release, e.g. openclaw-channel-agentnexus-v0.2.4"
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-plugin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    defaults:
      run:
        working-directory: packages/openclaw-channel-agentnexus

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: |
            packages/agentnexus-bridge-client/package-lock.json
            packages/openclaw-channel-agentnexus/package-lock.json

      - name: Verify npm token
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required to publish @haowei0520 packages."
            exit 1
          fi

      - name: Resolve package versions
        id: ver
        working-directory: ${{ github.workspace }}
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          PKG_VER=$(node -p "require('./packages/openclaw-channel-agentnexus/package.json').version")
          BRIDGE_VERSION=$(node -p "require('./packages/agentnexus-bridge-client/package.json').version")
          EXPECTED="openclaw-channel-agentnexus-v${PKG_VER}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match @haowei0520/openclaw-channel-agentnexus version (expected '$EXPECTED'). Bump version before tagging."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VER" >> "$GITHUB_OUTPUT"
          echo "bridge_version=$BRIDGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install bridge-client dependencies
        working-directory: packages/agentnexus-bridge-client
        run: npm ci

      - name: Verify bridge-client
        working-directory: packages/agentnexus-bridge-client
        run: |
          npm run lint
          npm test
          npm run build

      - name: Publish bridge-client to npm
        working-directory: packages/agentnexus-bridge-client
        env:
          BRIDGE_VERSION: ${{ steps.ver.outputs.bridge_version }}
        run: |
          set -euo pipefail
          if npm view "@haowei0520/bridge-client@${BRIDGE_VERSION}" version >/dev/null 2>&1; then
            echo "@haowei0520/bridge-client@${BRIDGE_VERSION} already exists on npm; skipping publish."
          else
            npm publish --access public --provenance
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Rewrite bridge-client dependency for npm publish
        env:
          BRIDGE_VERSION: ${{ steps.ver.outputs.bridge_version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.dependencies = pkg.dependencies || {};
          pkg.dependencies["@haowei0520/bridge-client"] = `^${process.env.BRIDGE_VERSION}`;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          node -p "require('./package.json').dependencies['@haowei0520/bridge-client']"

      - name: Publish OpenClaw plugin to npm
        env:
          PKG_VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "@haowei0520/openclaw-channel-agentnexus@${PKG_VER}" version >/dev/null 2>&1; then
            echo "@haowei0520/openclaw-channel-agentnexus@${PKG_VER} already exists on npm; skipping publish."
          else
            npm publish --access public --provenance
          fi

      - name: Build tarball
        id: pack
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent)
          # Stable filename so consumers can hit /releases/latest/download/<asset>
          STABLE="openclaw-channel-agentnexus.tgz"
          cp "$TARBALL" "$STABLE"
          ls -la "$TARBALL" "$STABLE"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE"   >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: openclaw-channel-agentnexus v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            packages/openclaw-channel-agentnexus/${{ steps.pack.outputs.tarball }}
            packages/openclaw-channel-agentnexus/${{ steps.pack.outputs.stable }}
