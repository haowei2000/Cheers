name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_GATEWAY: ghcr.io/${{ github.repository_owner }}/cheers-gateway
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/cheers-frontend

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed images
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - "server/**"
              # The gateway image compiles the shared bridge-protocol crate
              # (path dep) — a protocol change alone must rebuild it.
              - "packages/cheers-acp-connector-rs/bridge-protocol/**"
              - "docker-compose.yml.template"
              - ".github/workflows/cd.yml"
            frontend:
              - "frontend/**"
              - "docker-compose.yml.template"
              - ".github/workflows/cd.yml"

  # ─────────────────────────────────────────────
  # Build & push Docker images
  # ─────────────────────────────────────────────
  build-gateway:
    name: Build Gateway Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_GATEWAY }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push gateway
        id: build
        uses: docker/build-push-action@v6
        with:
          # Repo-root context: the gateway build needs the shared
          # bridge-protocol crate under packages/ (path dependency).
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push frontend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Deploy to the production server (Hetzner) via SSH.
  # The deploy key is a forced-command key on the server: any connection with it
  # runs /opt/cheers/deploy.sh (pull :main images → recreate gateway+frontend →
  # wait for gateway health) and nothing else. Gate: vars.DEPLOY_ENABLED = 'true'.
  # Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_KNOWN_HOSTS.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [changes, build-gateway, build-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      vars.DEPLOY_ENABLED == 'true' &&
      (needs.build-gateway.result == 'success' || needs.build-frontend.result == 'success') &&
      needs.build-gateway.result != 'failure' &&
      needs.build-frontend.result != 'failure'
    environment: production

    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          # The server side ignores the requested command (forced command),
          # but pass "deploy" for readable auth logs.
          ssh -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              "$USER@$HOST" deploy

      - name: Verify public health endpoint
        run: |
          for i in $(seq 1 10); do
            if curl -sf "https://${{ vars.APP_DOMAIN }}/health" >/dev/null; then
              echo "health ok"; exit 0
            fi
            sleep 3
          done
          echo "health endpoint not reachable" >&2; exit 1
