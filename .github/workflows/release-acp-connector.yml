name: Release ACP connector

on:
  push:
    tags:
      - "agentnexus-acp-connector-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, e.g. agentnexus-acp-connector-v0.1.0"
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-acp-connector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/agentnexus-acp-connector/package-lock.json

      - name: Verify npm token
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required to publish @haowei0520 packages."
            exit 1
          fi

      - name: Resolve package versions
        id: versions
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          ACP_VERSION=$(node -p "require('./packages/agentnexus-acp-connector/package.json').version")
          EXPECTED="agentnexus-acp-connector-v${ACP_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match @haowei0520/acp-connector version (expected '$EXPECTED')."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "acp_version=$ACP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install ACP connector dependencies
        working-directory: packages/agentnexus-acp-connector
        run: npm ci

      - name: Verify ACP connector
        working-directory: packages/agentnexus-acp-connector
        run: |
          npm run lint
          npm test
          npm run build

      - name: Pack ACP connector artifact
        id: acp_pack
        working-directory: packages/agentnexus-acp-connector
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent --ignore-scripts)
          STABLE="agentnexus-acp-connector.tgz"
          cp "$TARBALL" "$STABLE"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"

      - name: Publish ACP connector to npm
        working-directory: packages/agentnexus-acp-connector
        env:
          ACP_VERSION: ${{ steps.versions.outputs.acp_version }}
        run: |
          set -euo pipefail
          if npm view "@haowei0520/acp-connector@${ACP_VERSION}" version >/dev/null 2>&1; then
            echo "@haowei0520/acp-connector@${ACP_VERSION} already exists on npm; skipping publish."
          else
            npm publish --access public --ignore-scripts
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versions.outputs.tag }}
          name: agentnexus-acp-connector v${{ steps.versions.outputs.acp_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            packages/agentnexus-acp-connector/${{ steps.acp_pack.outputs.tarball }}
            packages/agentnexus-acp-connector/${{ steps.acp_pack.outputs.stable }}
