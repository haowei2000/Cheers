name: release-desktop

# Publish the macOS desktop app (.dmg + .app tarball) so users can install
# Cheers Desktop without a toolchain. Trigger by pushing a tag like
# `desktop-v0.1.0` (the workflow runs from the tagged commit, so tagging a
# feature-branch head works for preview releases).
#
# Apple-silicon only for now (macos-14 runner = arm64): an Intel build needs a
# cross-compiled sidecar + universal bundle, deferred until someone asks.
#
# UNSIGNED (Gatekeeper): there is no Developer ID signing/notarization yet, so
# Gatekeeper will warn on first launch. The release notes carry the right-click
# → Open escape hatch. Signing lands with a proper release pipeline later.
#
# SIGNED (updater): separate from Gatekeeper. The .app.tar.gz and latest.json
# are signed with the minisign updater key (secret DESKTOP_UPDATER_KEY, public
# half pinned in tauri.conf.json), so an installed app only ever runs an update
# this key signed. Losing the key means no client can update again — it lives
# in ~/.cheers-release/desktop-updater.key alongside the connector release key.
#
# NOT a prerelease: the app's update feed is the fixed URL
# releases/latest/download/latest.json, and GitHub's "latest" pointer skips
# prereleases — marking these prerelease would make the feed 404 forever.

on:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write # create the release + upload assets

jobs:
  build:
    name: build macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/macos/src-tauri
            packages/cheers-acp-connector-rs

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            apps/macos/package-lock.json

      - name: Install npm dependencies
        run: |
          npm --prefix frontend ci
          npm --prefix apps/macos ci

      # npm run build = build-sidecar.sh (stages the connector as a Tauri
      # sidecar) + tauri build (whose beforeBuildCommand builds the frontend).
      # createUpdaterArtifacts makes tauri build emit the updater tarball and its
      # .sig; the signing key must be present here or the build produces an
      # unsigned bundle that no installed client will accept.
      - name: Build the app
        run: npm --prefix apps/macos run build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.DESKTOP_UPDATER_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Package assets
        run: |
          BUNDLE=apps/macos/src-tauri/target/release/bundle
          mkdir dist-assets
          # End-user-legible names: this build targets macOS on Apple Silicon,
          # so the system is obvious from the filename (not "aarch64").
          cp "$BUNDLE"/dmg/Cheers_*.dmg dist-assets/Cheers-macOS-AppleSilicon.dmg
          # The updater consumes the tarball tauri signed, not a tar we rolled
          # ourselves — the .sig only matches those exact bytes.
          cp "$BUNDLE"/macos/Cheers.app.tar.gz dist-assets/Cheers-macOS-AppleSilicon.app.tar.gz
          cp "$BUNDLE"/macos/Cheers.app.tar.gz.sig dist-assets/Cheers-macOS-AppleSilicon.app.tar.gz.sig
          shasum -a 256 dist-assets/* | tee dist-assets/SHA256SUMS.txt
          ls -l dist-assets

      # The update feed. `platforms` keys are what the updater asks for; this
      # runner only ever produces darwin-aarch64, so an Intel Mac gets a clean
      # "no update" rather than a broken download.
      - name: Write latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          SIG=$(cat dist-assets/Cheers-macOS-AppleSilicon.app.tar.gz.sig)
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Cheers-macOS-AppleSilicon.app.tar.gz"
          python3 - "$VERSION" "$SIG" "$URL" <<'PY' | tee dist-assets/latest.json
          import json, sys, subprocess
          version, sig, url = sys.argv[1:4]
          pub = subprocess.run(
              ["git", "log", "-1", "--format=%cI"], capture_output=True, text=True
          ).stdout.strip()
          json.dump({
              "version": version,
              "pub_date": pub,
              "notes": f"Cheers Desktop {version}",
              "platforms": {"darwin-aarch64": {"signature": sig, "url": url}},
          }, sys.stdout, indent=2)
          PY

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Cheers Desktop (macOS · Apple Silicon)
          # Must stay false — see the header note on the updater feed URL.
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist-assets/*
          body: |
            ## Cheers Desktop — macOS (Apple Silicon)

            **For:** an Apple-silicon Mac (M1/M2/M3…) on **macOS 11+**.
            Intel Macs are **not** built yet.

            **Unsigned preview** — on first launch, right-click Cheers → Open
            (or clear quarantine: `xattr -dr com.apple.quarantine /Applications/Cheers.app`).

            **Install:** open `Cheers-macOS-AppleSilicon.dmg` and drag Cheers to
            Applications. The `cheers://` link scheme and Finder "Open With →
            Cheers" register on first launch of the installed app.

            **Updates:** this is the last version you install by hand. From
            0.1.2 on, Settings → Account → App updates checks this feed and
            updates in place; only builds signed with the Cheers updater key
            are accepted.

            | Download | System |
            |---|---|
            | `Cheers-macOS-AppleSilicon.dmg` | macOS 11+, Apple Silicon — installer |
            | `Cheers-macOS-AppleSilicon.app.tar.gz` | macOS 11+, Apple Silicon — bare .app (also the updater payload) |
            | `latest.json` | the in-app update feed — not a download |
