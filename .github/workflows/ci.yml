name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
      plugin: ${{ steps.filter.outputs.plugin }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - "server/**"
              - ".github/workflows/ci.yml"
            frontend:
              - "frontend/**"
              - ".github/workflows/ci.yml"
            plugin:
              - "packages/agentnexus-acp-connector/**"
              - "packages/agentnexus-acp-connector-rs/**"
              - "packages/agentnexus-mcp-server/**"
              - ".github/workflows/ci.yml"

  # ─────────────────────────────────────────────
  # Gateway (Rust): build + test
  # ─────────────────────────────────────────────
  gateway-check:
    name: Gateway Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      # 骨架阶段有已知 warnings；clippy 仅作信息，不阻塞。
      - name: Clippy (non-blocking)
        run: cargo clippy --all-targets || true

  # ─────────────────────────────────────────────
  # Frontend: type-check + build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check & build
        run: npm run build

  # ─────────────────────────────────────────────
  # Agent packages: TS compatibility packages + Rust connector/MCP binaries
  # ─────────────────────────────────────────────
  plugin-build:
    name: Agent Package Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.plugin == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/agentnexus-acp-connector/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/agentnexus-acp-connector-rs -> packages/agentnexus-acp-connector-rs/target
            packages/agentnexus-mcp-server -> packages/agentnexus-mcp-server/target

      - name: Install ACP connector dependencies
        working-directory: packages/agentnexus-acp-connector
        run: npm ci

      - name: Lint ACP connector
        working-directory: packages/agentnexus-acp-connector
        run: npm run lint

      - name: Test ACP connector
        working-directory: packages/agentnexus-acp-connector
        run: npm test

      - name: Build ACP connector
        working-directory: packages/agentnexus-acp-connector
        run: npm run build

      - name: Format Rust agent packages
        run: |
          cargo fmt --manifest-path packages/agentnexus-acp-connector-rs/Cargo.toml -- --check
          cargo fmt --manifest-path packages/agentnexus-mcp-server/Cargo.toml -- --check

      - name: Check Rust connector daemon
        run: cargo check --manifest-path packages/agentnexus-acp-connector-rs/Cargo.toml

      - name: Check Rust MCP server
        run: cargo check --manifest-path packages/agentnexus-mcp-server/Cargo.toml
