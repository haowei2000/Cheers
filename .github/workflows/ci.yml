name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
      plugin: ${{ steps.filter.outputs.plugin }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - "server/**"
              - ".github/workflows/ci.yml"
            frontend:
              - "frontend/**"
              - ".github/workflows/ci.yml"
            plugin:
              - "packages/agentnexus-bridge-client/**"
              - "packages/openclaw-channel-agentnexus/**"
              - "packages/agentnexus-mcp-server/**"
              - ".github/workflows/ci.yml"

  # ─────────────────────────────────────────────
  # Gateway (Rust): build + test
  # ─────────────────────────────────────────────
  gateway-check:
    name: Gateway Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      # 骨架阶段有已知 warnings；clippy 仅作信息，不阻塞。
      - name: Clippy (non-blocking)
        run: cargo clippy --all-targets || true

  # ─────────────────────────────────────────────
  # Frontend: type-check + build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check & build
        run: npm run build

  # ─────────────────────────────────────────────
  # Plugin: type-check + test + build
  # ─────────────────────────────────────────────
  plugin-build:
    name: Plugin Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.plugin == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: packages/openclaw-channel-agentnexus

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            packages/agentnexus-bridge-client/package-lock.json
            packages/openclaw-channel-agentnexus/package-lock.json

      - name: Install bridge client dependencies
        working-directory: packages/agentnexus-bridge-client
        run: npm ci

      - name: Build bridge client
        working-directory: packages/agentnexus-bridge-client
        run: npm run build

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
