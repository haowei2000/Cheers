name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
      plugin: ${{ steps.filter.outputs.plugin }}
      desktop: ${{ steps.filter.outputs.desktop }}
      ios: ${{ steps.filter.outputs.ios }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - "server/**"
              # The gateway's frame constructors are pinned to the shared
              # bridge-protocol golden fixtures — a fixture edit must re-run
              # gateway tests too.
              - "packages/cheers-acp-connector-rs/bridge-protocol/**"
              - ".github/workflows/ci.yml"
            frontend:
              - "frontend/**"
              - ".github/workflows/ci.yml"
            plugin:
              - "packages/cheers-acp-connector-rs/**"
              - "packages/cheers-mcp-server/**"
              - ".github/workflows/ci.yml"
            desktop:
              - "apps/macos/**"
              - ".github/workflows/ci.yml"
            ios:
              - "apps/ios/**"
              - "scripts/check-pbxproj.py"
              - ".github/workflows/ci.yml"

  # ─────────────────────────────────────────────
  # Gateway (Rust): build + test
  # ─────────────────────────────────────────────
  gateway-check:
    name: Gateway Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # The other Rust crates gate on fmt; the gateway didn't, so CLAUDE.md's
      # "run cargo fmt --check before pushing" was unenforced here. Runs before
      # the build so a formatting-only failure reports in seconds.
      - name: Format
        run: cargo fmt --check

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      # 骨架阶段有已知 warnings；clippy 仅作信息，不阻塞。
      - name: Clippy (non-blocking)
        run: cargo clippy --all-targets || true

  # ─────────────────────────────────────────────
  # Gateway (Rust): white-box integration tests (R4-2) against a real Postgres.
  # The suite is feature-gated (`#![cfg(feature = "integration")]`), so the plain
  # `cargo test` in gateway-check compiles zero of these — this job is the only
  # place the I1/I2/I4/I6 + R5 invariants are actually exercised against Postgres.
  # ─────────────────────────────────────────────
  gateway-integration:
    name: Gateway Integration (Postgres)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cheers
          POSTGRES_PASSWORD: cheers
          POSTGRES_DB: cheers
        ports:
          - 5432:5432
        # Gate the job on the DB being reachable before any test connects.
        options: >-
          --health-cmd "pg_isready -U cheers"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # #[sqlx::test] connects here, then CREATEs/DROPs an isolated database per
      # test and auto-runs server/migrations. The URL comes from the environment
      # (never hard-coded in code) so parallel stacks can vary it freely.
      DATABASE_URL: postgres://cheers:cheers@localhost:5432/cheers

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Integration tests (real Postgres)
        run: cargo test --features integration --test flows

  # ─────────────────────────────────────────────
  # Frontend: type-check + build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check & build
        run: npm run build

  # ─────────────────────────────────────────────
  # Agent packages: Rust connector/MCP binaries
  # ─────────────────────────────────────────────
  plugin-build:
    name: Agent Package Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.plugin == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/cheers-acp-connector-rs
            packages/cheers-mcp-server

      - name: Format Rust agent packages
        run: |
          cargo fmt --manifest-path packages/cheers-acp-connector-rs/Cargo.toml -- --check
          cargo fmt --manifest-path packages/cheers-mcp-server/Cargo.toml -- --check

      # --workspace: the connector dir is a 2-member mini-workspace (binary +
      # the shared cheers-bridge-protocol crate the gateway also depends on).
      - name: Check Rust connector daemon
        run: cargo check --workspace --manifest-path packages/cheers-acp-connector-rs/Cargo.toml

      - name: Test Rust connector daemon
        run: cargo test --workspace --manifest-path packages/cheers-acp-connector-rs/Cargo.toml

      - name: Check Rust MCP server
        run: cargo check --manifest-path packages/cheers-mcp-server/Cargo.toml

  desktop-check:
    name: Desktop Check
    # macos-14: the Tauri crate needs Apple frameworks; no `tauri build` in CI
    # (slow, and unsigned artifacts aren't shippable anyway) — fmt + check only.
    runs-on: macos-14
    needs: changes
    if: needs.changes.outputs.desktop == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/macos/src-tauri

      - name: Format desktop shell
        run: cargo fmt --manifest-path apps/macos/src-tauri/Cargo.toml -- --check

      # tauri-build validates bundle resources (frontendDist, externalBin) at
      # build time — stub both so `cargo check` runs without a frontend build
      # or a release-compiled connector.
      - name: Stub bundle resources
        run: |
          mkdir -p frontend/dist apps/macos/src-tauri/binaries
          touch frontend/dist/index.html
          touch apps/macos/src-tauri/binaries/cce-acp-connector-aarch64-apple-darwin
          touch apps/macos/src-tauri/binaries/cce-acp-connector-x86_64-apple-darwin

      - name: Check desktop shell
        run: cargo check --manifest-path apps/macos/src-tauri/Cargo.toml

  # ─────────────────────────────────────────────
  # iOS (Swift): project-file sanity + a real compile.
  #
  # Added after a broken develop on 2026-07-20: two parallel branches gave
  # ChatModelStore.swift and WorkbenchSheet.swift the same hand-assigned
  # pbxproj ids, Xcode silently dropped one, and nothing in CI compiled iOS at
  # all — the app simply stopped building and no gate noticed.
  #
  # Simulator destination + CODE_SIGNING_ALLOWED=NO: this proves the code and
  # the project file are sound without needing signing certs or a provisioning
  # profile in CI. Device signing stays a local/release concern.
  # ─────────────────────────────────────────────
  ios-build:
    name: iOS Build
    # macos-15, not macos-14: the sources need Swift 6 (`@retroactive`, and the
    # SwiftUI MainActor-isolation inference that lets a View hold a @MainActor
    # model). macos-14 defaults to Xcode 15.4 / Swift 5.10 and fails on both.
    runs-on: macos-15
    needs: changes
    if: needs.changes.outputs.ios == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/ios

    steps:
      - uses: actions/checkout@v4

      # Select the newest Xcode on the image rather than pinning a version: the
      # runner default lags well behind what the project is developed against,
      # and a hard-coded path breaks on the next image bump. The version is
      # printed so a future toolchain-drift failure is obvious in the log.
      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      # Runs first: when ids collide this names the two colliding files in a
      # second, where xcodebuild would instead fail minutes later pointing at
      # some unrelated file that referenced the dropped symbol.
      - name: Check project file
        run: python3 ../../scripts/check-pbxproj.py

      - name: Build (iOS Simulator, unsigned)
        run: |
          xcodebuild \
            -project Cheers.xcodeproj \
            -scheme Cheers \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build
