name: Deploy Pages

# Publishes the static landing page in website/ to GitHub Pages.
# Requires: repo Settings → Pages → Source = "GitHub Actions" (enabled once).
# Note: Pages on a PRIVATE repo needs a paid plan; on a public repo it is free.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
      # the plugins page serves these as downloads (assembled at build time below)
      - "server/assets/workbench-plugins/**"
      - "docs/arch/examples/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # plugins.html links to ./downloads/plugins/* — assembled here from the
      # sources of truth (official set + docs examples), never duplicated in git.
      - name: Assemble plugin downloads
        run: |
          mkdir -p website/downloads/plugins
          cp server/assets/workbench-plugins/*.plugin.html website/downloads/plugins/
          cp docs/arch/examples/*.plugin.html \
             docs/arch/examples/*.template.json \
             docs/arch/examples/cheers-plugin-sdk.js \
             website/downloads/plugins/
          # Official scenario templates get their OWN dir: docs examples share some
          # filenames (code-project / research-lab), one dir would silently clobber.
          mkdir -p website/downloads/templates
          cp server/assets/workbench-templates/*.template.json website/downloads/templates/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
