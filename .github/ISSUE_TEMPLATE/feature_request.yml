name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior and any alternatives considered.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Frontend
        - Docker / deployment
        - Agent Bridge
        - File preview / storage
        - Memory
        - Documentation
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, API examples, or related projects.
