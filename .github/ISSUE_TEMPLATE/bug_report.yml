name: Bug report
description: Report a reproducible problem in AgentNexus.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Start backend with ...
        2. Open ...
        3. Send ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "v0.1.0 / commit SHA / branch"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Frontend
        - Docker / deployment
        - Agent Bridge
        - File preview / storage
        - Memory
        - Documentation
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, tokens, emails, and private data before posting.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed secrets, tokens, and private data from this issue.
          required: true
        - label: I searched existing issues before opening this one.
          required: true
