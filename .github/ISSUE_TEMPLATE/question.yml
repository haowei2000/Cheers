name: Question
description: Ask for help using or deploying Cheers.
title: "[Question]: "
labels: ["question", "needs-triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker/Python/Node versions, deployment mode, and relevant configuration with secrets removed.
      render: shell
