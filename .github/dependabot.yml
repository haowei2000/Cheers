version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/packages/cheers-acp-connector-rs"
    target-branch: "develop"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/packages/cheers-mcp-server"
    target-branch: "develop"
    schedule:
      interval: "weekly"
