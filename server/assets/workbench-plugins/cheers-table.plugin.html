<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- Official workbench plugin (seeded by the gateway; `version` drives re-seeding).
         Renders a JSON array of objects as an editable table — columns inferred from
         the union of row keys (first-seen order), no external config needed. -->
    <script type="application/json" id="cheers-plugin">
      {
        "id": "cheers-table",
        "protocol": 1,
        "version": 1,
        "title": "Table",
        "renderers": [
          {
            "id": "table",
            "title": "Table",
            "match": { "format": "json", "dataKind": "array" }
          }
        ]
      }
    </script>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font: 12px system-ui, sans-serif; background: #0a0a0a; color: #e4e4e7; }
      #bar { display: flex; gap: 8px; align-items: center; padding: 6px 10px; border-bottom: 1px solid #27272a; }
      #bar button { background: #27272a; color: #e4e4e7; border: 0; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
      #bar button:hover { background: #3f3f46; }
      #st { color: #71717a; font-size: 11px; margin-left: auto; }
      #wrap { overflow: auto; padding: 6px 10px; }
      table { border-collapse: collapse; width: 100%; }
      th { text-align: left; color: #a1a1aa; font-weight: 600; padding: 3px 6px; border-bottom: 1px solid #27272a; white-space: nowrap; }
      td { padding: 1px 2px; border-bottom: 1px solid #18181b; }
      td input { width: 100%; box-sizing: border-box; background: transparent; color: #e4e4e7; border: 1px solid transparent; border-radius: 3px; padding: 2px 4px; font: inherit; }
      td input:focus { outline: none; border-color: #6366f1; background: #18181b; }
      td.ro { color: #71717a; font-family: ui-monospace, monospace; font-size: 11px; padding: 2px 6px; }
      td.del { width: 20px; }
      td.del button { background: none; border: 0; color: #52525b; cursor: pointer; }
      td.del button:hover { color: #f87171; }
    </style>
  </head>
  <body>
    <div id="bar">
      <button id="add" type="button">+ Row</button>
      <span id="st"></span>
    </div>
    <div id="wrap"><table id="t"></table></div>
    <script>
      /* inlined cheers-plugin-sdk v1 (docs/arch/examples/cheers-plugin-sdk.js) */
      function cheersPlugin(opts) {
        var reqId = 0, pendingRes = {}, pendingSave = null;
        window.addEventListener("message", function (e) {
          var m = e.data;
          if (!m || typeof m !== "object") return;
          if (m.type === "cheers:render") { if (opts.onRender) opts.onRender(m); }
          else if (m.type === "cheers:saved") {
            var p = pendingSave; pendingSave = null;
            if (p) (m.ok ? p.resolve({ version: m.version }) : p.reject(new Error(m.error || "save failed")));
          } else if (m.type === "cheers:resource:result") {
            var r = pendingRes[m.reqId]; if (!r) return;
            delete pendingRes[m.reqId];
            (m.ok ? r.resolve(m.data) : r.reject(new Error(m.error || "resource error")));
          }
        });
        var api = {
          save: function (content) {
            return new Promise(function (resolve, reject) {
              pendingSave = { resolve: resolve, reject: reject };
              parent.postMessage({ type: "cheers:save", content: content }, "*");
            });
          },
          resource: function (name, params) {
            return new Promise(function (resolve, reject) {
              var id = ++reqId;
              pendingRes[id] = { resolve: resolve, reject: reject };
              parent.postMessage({ type: "cheers:resource", reqId: id, resource: name, params: params || {} }, "*");
            });
          },
          unsupported: function (reason) { parent.postMessage({ type: "cheers:unsupported", reason: reason }, "*"); },
        };
        parent.postMessage({ type: "cheers:ready" }, "*");
        return api;
      }

      var rows = []; // array of plain objects (the file's parsed content)
      function setStatus(t) { document.getElementById("st").textContent = t; }

      var host = cheersPlugin({
        onRender: function (file) {
          var data;
          try { data = file.content.trim() ? JSON.parse(file.content) : []; }
          catch (e) { host.unsupported("not valid JSON"); return; }
          if (!Array.isArray(data)) { host.unsupported("top level is not an array"); return; }
          // Runtime verdict, stricter than dataKind: every element must be a plain object.
          if (!data.every(function (r) { return r && typeof r === "object" && !Array.isArray(r); })) {
            host.unsupported("not an array of objects");
            return;
          }
          rows = data;
          render();
        },
      });

      function save() {
        host.save(JSON.stringify(rows, null, 2))
          .then(function (r) { setStatus("Saved v" + r.version); })
          .catch(function (e) { setStatus("Save failed: " + e.message); });
      }

      // Columns = union of row keys, first-seen order. Empty file => one starter column.
      function columns() {
        // Set, not {}: a plain object inherits Object.prototype, so row keys like
        // "constructor" or "toString" would look already-seen and lose their column.
        var cols = [], seen = new Set();
        rows.forEach(function (r) {
          Object.keys(r).forEach(function (k) { if (!seen.has(k)) { seen.add(k); cols.push(k); } });
        });
        return cols.length ? cols : ["value"];
      }

      // Cell edits preserve the original scalar type; structured cells stay read-only.
      function coerce(prev, text) {
        if (typeof prev === "number" && text.trim() !== "" && !isNaN(Number(text))) return Number(text);
        if (typeof prev === "boolean" && /^(true|false)$/i.test(text.trim())) return text.trim().toLowerCase() === "true";
        return text;
      }

      function render() {
        var cols = columns();
        var t = document.getElementById("t");
        t.innerHTML = "";
        var head = t.createTHead().insertRow();
        cols.forEach(function (c) {
          var th = document.createElement("th");
          th.textContent = c;
          head.appendChild(th);
        });
        head.appendChild(document.createElement("th"));
        var body = t.createTBody();
        rows.forEach(function (row, ri) {
          var tr = body.insertRow();
          cols.forEach(function (c) {
            var td = tr.insertCell();
            var v = row[c];
            if (v !== null && v !== undefined && typeof v === "object") {
              td.className = "ro"; /* nested structures: shown, never edited here */
              td.textContent = JSON.stringify(v);
              td.title = "nested value — edit in Raw";
            } else {
              var inp = document.createElement("input");
              inp.value = v === undefined || v === null ? "" : String(v);
              inp.onchange = function () {
                row[c] = coerce(v, inp.value);
                save();
              };
              td.appendChild(inp);
            }
          });
          var del = tr.insertCell();
          del.className = "del";
          var btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = "✕";
          btn.title = "Delete row";
          btn.onclick = function () { rows.splice(ri, 1); render(); save(); };
          del.appendChild(btn);
        });
      }

      document.getElementById("add").onclick = function () {
        var blank = {};
        columns().forEach(function (c) { blank[c] = ""; });
        rows.push(blank);
        render();
        save();
      };
    </script>
  </body>
</html>
