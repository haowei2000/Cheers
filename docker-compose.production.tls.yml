services:
  postgres:
    # The base file publishes this on 0.0.0.0 unconditionally; restrict it to
    # loopback in production so Postgres isn't reachable from the internet.
    ports: !override
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"

  gateway:
    ports: !override
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${GATEWAY_HOST_PORT:-8000}:8000"
    environment:
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://cheers.example.com}
      # Behind the Caddy TLS edge (+ frontend nginx) the proxy headers are set by
      # trusted hops, and the gateway/postgres/rustfs host ports are bound to
      # loopback — so keying the rate limiter on X-Real-IP/X-Forwarded-For is
      # safe here and required to distinguish real client IPs.
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-true}
      # Public websocket base handed to external connectors by the onboarding
      # flow. Without it the gateway falls back to ws://localhost:8000, which
      # only works for same-machine dev — never for a TLS deployment.
      - CHEERS_CONNECTOR_PUBLIC_BASE=${CHEERS_CONNECTOR_PUBLIC_BASE:-wss://${APP_DOMAIN:-cheers.example.com}}

  frontend:
    # No host port here: FRONTEND_HOST_PORT defaults to 80, same as tls-edge's
    # HTTP_PORT below, so publishing both collides. Caddy reaches this service
    # over the internal Docker network (frontend:80) instead.
    ports: !override []

  rustfs:
    ports: !override
      - "${RUSTFS_API_HOST_BIND:-127.0.0.1}:${RUSTFS_API_HOST_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_HOST_BIND:-127.0.0.1}:${RUSTFS_CONSOLE_HOST_PORT:-9001}:9001"
    environment:
      - RUSTFS_CORS_ALLOWED_ORIGINS=${RUSTFS_CORS_ALLOWED_ORIGINS:-https://cheers.example.com}
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS:-https://cheers.example.com}

  tls-edge:
    # Custom Caddy build with the Cloudflare DNS plugin, for ACME DNS-01.
    build:
      context: .
      dockerfile: docker/Dockerfile.caddy
    image: ${TLS_EDGE_IMAGE:-cheers/tls-edge:latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy_data persists the issued ACME certs across restarts — without it
      # Caddy re-requests on every boot and will hit Let's Encrypt rate limits.
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Primary public host. APP_DOMAIN_LEGACY is served in parallel during a
      # domain migration; leave it empty when there is only one domain.
      - APP_DOMAIN=${APP_DOMAIN:-cheers.example.com}
      - APP_DOMAIN_LEGACY=${APP_DOMAIN_LEGACY:-}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-cheers-files}
      # ACME account email (expiry notices) and the Cloudflare API token used
      # for the DNS-01 challenge. The token needs Zone:DNS:Edit on the zone(s)
      # covering APP_DOMAIN / APP_DOMAIN_LEGACY. Provide it out-of-band in .env.
      - ACME_EMAIL=${ACME_EMAIL:-}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
    depends_on:
      - gateway
      - frontend
      - rustfs
    command: ["caddy","run","--config","/etc/caddy/Caddyfile"]

volumes:
  caddy_data:
  caddy_config:
