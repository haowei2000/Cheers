services:
  gateway:
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${GATEWAY_HOST_PORT:-8000}:8000"
    environment:
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://cheers.example.com}
      - STORAGE_S3_PUBLIC_ENDPOINT=${STORAGE_S3_PUBLIC_ENDPOINT:-https://cheers.example.com}

  frontend:
    ports:
      - "${FRONTEND_HOST_BIND:-127.0.0.1}:${FRONTEND_HOST_PORT:-80}:80"

  rustfs:
    ports:
      - "${RUSTFS_API_HOST_BIND:-127.0.0.1}:${RUSTFS_API_HOST_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_HOST_BIND:-127.0.0.1}:${RUSTFS_CONSOLE_HOST_PORT:-9001}:9001"
    environment:
      - RUSTFS_CORS_ALLOWED_ORIGINS=${RUSTFS_CORS_ALLOWED_ORIGINS:-https://cheers.example.com}
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS:-https://cheers.example.com}

  tls-edge:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${TLS_CERT_DIR:-./certs}:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-cheers.example.com}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-cheers-files}
      - TLS_CERT_FILE=${TLS_CERT_FILE:-/etc/caddy/certs/fullchain.pem}
      - TLS_KEY_FILE=${TLS_KEY_FILE:-/etc/caddy/certs/privkey.pem}
    depends_on:
      - gateway
      - frontend
      - rustfs
    command: ["caddy","run","--config","/etc/caddy/Caddyfile"]

volumes:
  caddy_data:
  caddy_config:
