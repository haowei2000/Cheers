# Alembic 配置：Context Store（四层记忆 SQLite）

[alembic]
script_location = %(here)s/alembic_context
prepend_sys_path = .
path_separator = os

# sqlalchemy.url 由 env.py 从环境变量 SQLITE_CONTEXT_PATH 动态构建
sqlalchemy.url = sqlite:///data/context_store/context.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
