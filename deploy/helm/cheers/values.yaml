# Default values for the Cheers chart. Overridden by values-dev.yaml /
# values-prod.yaml. Secrets here are DEV defaults — override in prod.

nameOverride: ""
fullnameOverride: ""

# Applied to every image as a default registry prefix (e.g. "ghcr.io/you").
imageRegistry: ""
imagePullSecrets: []

# ── Gateway (Rust server/, the only backend) ──────────────────────────────
gateway:
  image:
    repository: cheers/gateway
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8000
  # Non-secret env. Secret env (DB pw, S3 keys, admin pw, JWT) come from the Secret.
  adminUsername: admin
  adminDisplayName: "Demo Admin"
  corsAllowedOrigins: "" # empty = allow all (dev). Set explicit origins in prod.
  # Rate-limit client identity: in this chart the gateway is ClusterIP-only and
  # every client request passes the bundled frontend nginx (which sets
  # X-Real-IP) or the ingress, so proxy headers are trustworthy. Set false if
  # you expose the gateway Service directly (NodePort/LoadBalancer).
  trustProxyHeaders: true
  s3Region: us-east-1
  extraEnv: {} # map of EXTRA_VAR: value
  resources: {}
  #  requests: { cpu: 100m, memory: 128Mi }
  #  limits:   { cpu: "1",  memory: 512Mi }
  service:
    type: ClusterIP
    # Only honored when type=NodePort. Lets a connector dial the agent-bridge
    # directly (the host must map this port, e.g. kind extraPortMappings).
    # Locally the agent-bridge is also reachable via the frontend NodePort,
    # which nginx proxies (/ws/* → gateway) — see CHEERS_CONNECTOR_PUBLIC_BASE.
    nodePort: "" # only when type=NodePort

# ── Frontend (nginx serving the Vite build, proxies /api+/ws → gateway) ────
frontend:
  image:
    repository: cheers/frontend
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 80
  resources: {}
  service:
    # ClusterIP for ingress; NodePort for quick local access without ingress.
    type: ClusterIP
    nodePort: "" # only when type=NodePort

# ── Bot connector workload. Disabled by default because it requires a bot token
#    secret. When enabled, it runs a separate ACP connector pod. Pick the agent
#    with `agentType`: "opencode" (default; OpenAI-compatible, works with DeepSeek)
#    or "codex" (`codex-acp`). Each agent reads a different env-var contract, so
#    the pod template and the token/apiKey secret keys switch with agentType. ────
bot:
  enabled: false
  # "opencode" or "codex". Selects the image default, the entrypoint env-var
  # contract, and the default token/apiKey secret keys below.
  agentType: opencode
  image:
    # Leave empty to default from agentType: cheers/opencode-bot or cheers/codex-bot.
    repository: ""
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicaCount: 1
  username: opencode
  workspaceDir: /workspace
  stateDir: /app/state
  promptTimeoutMs: 900000
  requestTimeoutMs: 120000
  permissionTimeoutMs: 900000
  # Defaults to the in-cluster gateway service. Override only for unusual routing.
  wsBase: ""
  # ── OpenCode agent (agentType=opencode). OpenAI-compatible; the apiKey below is
  #    REQUIRED. Defaults target DeepSeek. ──────────────────────────────────────
  opencode:
    command: opencode
    provider: deepseek
    model: "" # empty → "<provider>/deepseek-chat"; else "<provider>/<model>" or "prov/model"
    baseUrl: https://api.deepseek.com
    nativePermissionMode: ask # ask | allow | deny | reject
  # ── Codex agent (agentType=codex). ──────────────────────────────────────────
  codex:
    command: codex-acp
    args: [] # e.g. ["--some-flag"]
    allowedConfigOptions:
      - model
      - reasoning_effort
      - approval_policy
      - sandbox
    extraEnvAllow: []
  token:
    # Prefer an existing Secret in production:
    #   kubectl create secret generic cheers-opencode-bot \
    #     --from-literal=OPENCODE_BOT_TOKEN=agb_...
    existingSecret: ""
    # Env var the connector reads its Agent Bridge token from. Leave empty to
    # default from agentType (OPENCODE_BOT_TOKEN / CHEERS_BOT_TOKEN).
    key: ""
    # Dev-only convenience when secrets.create=true. Do not commit real tokens.
    value: ""
  openaiApiKey:
    # OpenCode: REQUIRED (the model API key, e.g. a DeepSeek key). Codex: optional
    # (Codex can use subscription auth from a HOME on the state volume instead).
    existingSecret: ""
    # Leave empty to default from agentType
    # (OPENCODE_OPENAI_API_KEY / OPENAI_API_KEY).
    key: ""
    value: ""
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  resources: {}

# ── Postgres (bundled; for prod consider a managed DB + postgres.enabled=false) ─
postgres:
  enabled: true
  image: postgres:16-alpine
  database: cheers
  username: cheers
  # password → Secret (secrets.postgresPassword)
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources: {}
  # Nightly logical backup (pg_dump | gzip) → S3, via postgres-backup.yaml. OFF by
  # default; for production prefer a MANAGED database with native PITR + external S3.
  # When enabled, dumps use the same S3_* secret creds the gateway uses.
  backup:
    enabled: false
    schedule: "0 3 * * *" # 03:00 daily (cluster timezone)
    retentionDays: 14
    # Pinned (not :latest) so the backup job's tooling can't drift under us.
    mcImage: minio/mc:RELEASE.2025-08-13T08-35-41Z
    prefix: postgres-backups
    # Override to target an external S3; empty → the bundled rustfs endpoint/bucket.
    s3Endpoint: ""
    bucket: ""

# ── RustFS (S3-compatible object store; the gateway auto-creates the bucket) ─
rustfs:
  enabled: true
  # Pinned (not :latest): rustfs runs as root (its image has no non-root user
  # yet), so at minimum the bits must be reproducible and not drift on restart.
  image: rustfs/rustfs:1.0.0-beta.8
  bucket: cheers-files
  apiPort: 9000
  consolePort: 9001
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources: {}

# ── Gotenberg (office→PDF conversion for in-app document preview). Stateless;
#    the gateway feeds it bytes over the cluster network (GOTENBERG_URL is wired
#    into the gateway automatically when enabled). LibreOffice needs some memory. ─
gotenberg:
  enabled: true
  image: gotenberg/gotenberg:8
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ── Redis (ONLY needed for multi-instance HA fan-out; single instance uses
#    the in-process DashMap, so default off) ─────────────────────────────────
redis:
  enabled: false
  image: redis:7-alpine
  resources: {}

# ── Secrets. create=true renders a Secret from the values below (dev). In prod,
#    set create=false and point existingSecret at a Secret with the same keys. ─
secrets:
  create: true
  existingSecret: ""
  postgresPassword: cheers
  s3AccessKey: cheers-local-access-key
  s3SecretKey: cheers-local-secret-key
  # Initial admin login password (seeded on first boot). NO default on purpose:
  # a well-known password must never ship silently. REQUIRED when create=true —
  # set it explicitly (--set secrets.adminPassword=...) or use values-dev.yaml,
  # which pins the documented local-dev password.
  adminPassword: ""
  # RS256 PEM keypair — the gateway requires BOTH. Provide via `--set-file`
  # (dev) or an existing Secret (prod). Generate:
  #   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out priv.pem
  #   openssl rsa -in priv.pem -pubout -out pub.pem
  jwtPrivateKey: ""
  jwtPublicKey: ""

# ── Ingress (path-routes /api + /ws to the gateway, everything else to the
#    frontend; when disabled, reach the frontend Service directly) ───────────
ingress:
  enabled: false
  className: ""
  host: cheers.local
  annotations: {}
  tls: [] # [{ secretName: cheers-tls, hosts: [cheers.example.com] }]
