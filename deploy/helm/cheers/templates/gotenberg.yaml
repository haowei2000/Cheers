{{- if .Values.gotenberg.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cheers.gotenberg.fullname" . }}
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
    app.kubernetes.io/component: gotenberg
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gotenberg") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gotenberg") | nindent 8 }}
    spec:
      containers:
        - name: gotenberg
          image: {{ .Values.gotenberg.image }}
          args:
            - "gotenberg"
            - "--api-port={{ .Values.gotenberg.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.gotenberg.port }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.gotenberg.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cheers.gotenberg.fullname" . }}
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
    app.kubernetes.io/component: gotenberg
spec:
  selector:
    {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gotenberg") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.gotenberg.port }}
      targetPort: http
{{- end }}
