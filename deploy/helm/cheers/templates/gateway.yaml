apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cheers.gateway.fullname" . }}
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pods when chart-managed secret values change (e.g. enabling
        # Web Push by adding secrets.vapidPrivateKey): the env wiring uses
        # `optional: true`, so the pod template alone would be byte-identical
        # and `helm upgrade` would otherwise leave the old process running
        # without the new key. Covers only secrets.create=true; with an
        # existingSecret, rotate + `kubectl rollout restart` manually.
        checksum/secret: {{ toYaml .Values.secrets | sha256sum }}
      labels:
        {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # The gateway binary needs no root, no capabilities, and never writes to
      # its own filesystem (files go to S3, state to Postgres) — lock it down.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: {{ include "cheers.image" (dict "ctx" . "repository" .Values.gateway.image.repository "tag" .Values.gateway.image.tag) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          env:
            # Secret-derived values first so $(VAR) substitution works below.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: POSTGRES_PASSWORD }
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: S3_ACCESS_KEY }
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: S3_SECRET_KEY }
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: ADMIN_PASSWORD }
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: JWT_PRIVATE_KEY }
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: JWT_PUBLIC_KEY }
            {{- /* optional: absent from the Secret ⇒ Web Push disabled (gateway logs it). */}}
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: VAPID_PRIVATE_KEY, optional: true }
            {{- if .Values.gateway.vapidSubject }}
            - name: VAPID_SUBJECT
              value: {{ .Values.gateway.vapidSubject | quote }}
            {{- end }}
            - name: PORT
              value: {{ .Values.gateway.port | quote }}
            - name: DATABASE_URL
              value: {{ include "cheers.databaseUrl" . | quote }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ include "cheers.redis.fullname" . }}:6379/0"
            {{- end }}
            - name: S3_ENDPOINT
              value: "http://{{ include "cheers.rustfs.fullname" . }}:{{ .Values.rustfs.apiPort }}"
            - name: S3_BUCKET
              value: {{ .Values.rustfs.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.gateway.s3Region | quote }}
            {{- if .Values.gotenberg.enabled }}
            - name: GOTENBERG_URL
              value: "http://{{ include "cheers.gotenberg.fullname" . }}:{{ .Values.gotenberg.port }}"
            {{- end }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.gateway.corsAllowedOrigins | quote }}
            - name: TRUST_PROXY_HEADERS
              value: {{ .Values.gateway.trustProxyHeaders | quote }}
            - name: ADMIN_USERNAME
              value: {{ .Values.gateway.adminUsername | quote }}
            - name: ADMIN_DISPLAY_NAME
              value: {{ .Values.gateway.adminDisplayName | quote }}
            {{- range $k, $v := .Values.gateway.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cheers.gateway.fullname" . }}
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: http
      {{- if and (eq .Values.gateway.service.type "NodePort") .Values.gateway.service.nodePort }}
      nodePort: {{ .Values.gateway.service.nodePort }}
      {{- end }}
