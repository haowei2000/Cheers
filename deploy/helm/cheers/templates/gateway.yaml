apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cheers.gateway.fullname" . }}
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "cheers.image" (dict "ctx" . "repository" .Values.gateway.image.repository "tag" .Values.gateway.image.tag) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          env:
            # Secret-derived values first so $(VAR) substitution works below.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: POSTGRES_PASSWORD }
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: S3_ACCESS_KEY }
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: S3_SECRET_KEY }
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: ADMIN_PASSWORD }
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: JWT_PRIVATE_KEY }
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "cheers.secretName" . }}, key: JWT_PUBLIC_KEY }
            - name: PORT
              value: {{ .Values.gateway.port | quote }}
            - name: DATABASE_URL
              value: {{ include "cheers.databaseUrl" . | quote }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ include "cheers.redis.fullname" . }}:6379/0"
            {{- end }}
            - name: S3_ENDPOINT
              value: "http://{{ include "cheers.rustfs.fullname" . }}:{{ .Values.rustfs.apiPort }}"
            - name: S3_BUCKET
              value: {{ .Values.rustfs.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.gateway.s3Region | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.gateway.corsAllowedOrigins | quote }}
            - name: ADMIN_USERNAME
              value: {{ .Values.gateway.adminUsername | quote }}
            - name: ADMIN_DISPLAY_NAME
              value: {{ .Values.gateway.adminDisplayName | quote }}
            {{- range $k, $v := .Values.gateway.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cheers.gateway.fullname" . }}
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "cheers.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: http
