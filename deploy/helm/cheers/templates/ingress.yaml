{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cheers.fullname" . }}
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API + WebSocket go straight to the gateway.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "cheers.gateway.fullname" . }}
                port: { number: {{ .Values.gateway.port }} }
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "cheers.gateway.fullname" . }}
                port: { number: {{ .Values.gateway.port }} }
          # Everything else is the SPA.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cheers.frontend.fullname" . }}
                port: { number: {{ .Values.frontend.port }} }
{{- end }}
