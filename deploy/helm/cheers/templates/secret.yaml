{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cheers.fullname" . }}-secrets
  labels:
    {{- include "cheers.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  {{- /* The gateway refuses to start on a blank/invalid keypair, so fail the
       render already: an empty key here would only produce a CrashLooping pod. */}}
  JWT_PRIVATE_KEY: |-
{{ required "secrets.jwtPrivateKey is required when secrets.create=true — generate an RS256 keypair and pass --set-file secrets.jwtPrivateKey=priv.pem (see chart README)" .Values.secrets.jwtPrivateKey | indent 4 }}
  JWT_PUBLIC_KEY: |-
{{ required "secrets.jwtPublicKey is required when secrets.create=true — pass --set-file secrets.jwtPublicKey=pub.pem (see chart README)" .Values.secrets.jwtPublicKey | indent 4 }}
{{- if .Values.bot.token.value }}
  {{ include "cheers.bot.tokenKey" . }}: {{ .Values.bot.token.value | quote }}
{{- end }}
{{- if .Values.bot.openaiApiKey.value }}
  {{ include "cheers.bot.apiKeyKey" . }}: {{ .Values.bot.openaiApiKey.value | quote }}
{{- end }}
{{- end }}
